version: 1
servers:
  - id: docs-context
    enabled: false
    command: /path/to/docs-mcp-server
    args:
      - --stdio
    env_refs:
      - DOCS_MCP_TOKEN
    scope: docs
    notes: "Example only. Replace with your own docs MCP server and enable explicitly."
  - id: process-memory
    enabled: false
    command: /path/to/python
    args:
      - -m
      - your_memory_server.mcp_server
    env_refs: []
    scope: process-memory
    notes: "MemPalace is a recommended backend, but the public template does not assume a local install."
  - id: subagent-orchestrator
    enabled: false
    command: node
    args:
      - /path/to/orchestrator/mcp-server.js
    env_refs: []
    scope: subagent-orchestration
    notes: "Maestro is a recommended backend, but users should wire their own installation path."
